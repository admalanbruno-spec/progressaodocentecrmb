<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Consulta de Progressão Docente</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Consulta de Progressão Docente</h1>

<div class="container">

<label>Matrícula SIAPE</label>
<input id="siape" type="text" placeholder="Digite sua matrícula">

<label>
<input type="checkbox" id="temAfastamento" onchange="toggleAfastamento()">
Possuo afastamentos que interrompem o interstício
</label>

<div id="areaAfastamento" style="display:none">

<h3>Afastamento</h3>

<label>Tipo de afastamento</label>

<select id="tipoAfastamento">

<option value="">Selecione</option>

<option>Licença para tratar de interesses particulares</option>
<option>Licença para atividade política</option>
<option>Licença para acompanhar cônjuge</option>
<option>Afastamento sem remuneração</option>
<option>Suspensão disciplinar</option>

</select>

<label>Data início</label>
<input type="date" id="dataInicioAfastamento">

<label>Data fim</label>
<input type="date" id="dataFimAfastamento">

</div>

<button onclick="consultar()">Consultar progressão</button>

</div>

<div id="resultado"></div>

<script src="script.js"></script>

</body>
</html>
